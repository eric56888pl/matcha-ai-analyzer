<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Zen Photo Grader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #eae7de; /* 奶油白 */
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start pt-12 bg-[#eae7de] text-[#133529]">
  <div class="w-full max-w-md mx-auto p-8 rounded-2xl shadow-lg bg-white/90" style="background-color: #eae7de;">
    <!-- 語言切換區 -->
    <div class="flex justify-end mb-8">
      <button id="lang-en" class="text-[#133529] border-2 border-[#133529] rounded-full px-4 py-1 mr-2 font-semibold hover:bg-[#133529] hover:text-[#eae7de] transition">EN</button>
      <button id="lang-pl" class="text-[#133529] border-2 border-[#133529] rounded-full px-4 py-1 font-semibold hover:bg-[#133529] hover:text-[#eae7de] transition">PL</button>
    </div>
    
    <!-- 照片上傳區 -->
    <div class="mb-6">
      <label id="upload-label" for="photo-upload" class="block mb-2 text-lg font-medium text-[#133529]">
        Upload Photo
      </label>
      <div class="w-full flex items-center justify-center bg-[#eae7de] border-2 border-dashed border-[#133529] rounded-lg py-8">
        <div>
          <input id="photo-upload" type="file" accept="image/*" class="hidden" />
          <button id="select-photo"
            class="bg-[#133529] text-[#eae7de] px-4 py-2 rounded-lg shadow hover:bg-[#254e35] transition font-semibold">
            Select Image
          </button>
        </div>
      </div>
      <div id="preview-container" class="mt-4 flex justify-center">
        <!-- 預覽圖會出現在這裡 -->
      </div>
    </div>
    
    <!-- 鑑定等級按鈕 -->
    <div class="flex justify-center mb-8">
      <button id="grade-btn"
        class="bg-[#133529] text-[#eae7de] text-lg px-8 py-3 rounded-full hover:bg-[#254e35] transition font-bold shadow">
        Grade
      </button>
    </div>
    
    <!-- 鑑定結果顯示 -->
    <div id="result" class="bg-white/80 p-6 rounded-xl shadow-inner text-[#133529] text-center space-y-2 hidden">
      <div>
        <span class="font-semibold" id="colorScore-label">Color Score:</span>
        <span id="colorScore">-</span>
      </div>
      <div>
        <span class="font-semibold" id="foam-label">Foam Fineness:</span>
        <span id="foam">-</span>
      </div>
      <div>
        <span class="font-semibold" id="usage-label">Recommended Use:</span>
        <span id="usage">-</span>
      </div>
    </div>
  </div>
  
  <script>
    // 多語內容
    const i18n = {
      en: {
        uploadPhoto: 'Upload Photo',
        selectImage: 'Select Image',
        grade: 'Grade',
        colorScore: 'Color Score:',
        foam: 'Foam Fineness:',
        usage: 'Recommended Use:',
        results: [
          { 
            colorScore: '8.5 / 10', 
            foam: 'Fine', 
            usage: 'Matcha Latte' 
          },
          { 
            colorScore: '9.0 / 10', 
            foam: 'Very Fine', 
            usage: 'Usucha' 
          },
          { 
            colorScore: '7.5 / 10', 
            foam: 'Medium', 
            usage: 'Cooking' 
          }
        ]
      },
      pl: {
        uploadPhoto: 'Załaduj zdjęcie',
        selectImage: 'Wybierz zdjęcie',
        grade: 'Oceń',
        colorScore: 'Ocena koloru:',
        foam: 'Subtelność piany:',
        usage: 'Zalecane zastosowanie:',
        results: [
          { 
            colorScore: '8.5 / 10', 
            foam: 'Drobna', 
            usage: 'Matcha Latte' 
          },
          { 
            colorScore: '9.0 / 10', 
            foam: 'Bardzo drobna', 
            usage: 'Usucha' 
          },
          { 
            colorScore: '7.5 / 10', 
            foam: 'Średnia', 
            usage: 'Gotowanie' 
          }
        ]
      }
    };

    let lang = 'en';

    const setLang = (newLang) => {
      lang = newLang;
      document.getElementById('lang-en').classList.toggle('bg-[#133529]', lang === 'en');
      document.getElementById('lang-en').classList.toggle('text-[#eae7de]', lang === 'en');
      document.getElementById('lang-pl').classList.toggle('bg-[#133529]', lang === 'pl');
      document.getElementById('lang-pl').classList.toggle('text-[#eae7de]', lang === 'pl');
      document.getElementById('upload-label').textContent = i18n[lang].uploadPhoto;
      document.getElementById('select-photo').textContent = i18n[lang].selectImage;
      document.getElementById('grade-btn').textContent = i18n[lang].grade;
      document.getElementById('colorScore-label').textContent = i18n[lang].colorScore;
      document.getElementById('foam-label').textContent = i18n[lang].foam;
      document.getElementById('usage-label').textContent = i18n[lang].usage;
    };

    document.getElementById('lang-en').addEventListener('click', () => setLang('en'));
    document.getElementById('lang-pl').addEventListener('click', () => setLang('pl'));

    // 選擇圖片
    document.getElementById('select-photo').addEventListener('click', () => {
      document.getElementById('photo-upload').click();
    });

    document.getElementById('photo-upload').addEventListener('change', (e) => {
      const file = e.target.files[0];
      const preview = document.getElementById('preview-container');
      preview.innerHTML = '';
      if (file && file.type.startsWith('image/')) {
        const img = document.createElement('img');
        img.className = "max-h-48 rounded-xl object-contain shadow";
        img.src = URL.createObjectURL(file);
        preview.appendChild(img);
      }
    });

    // 鑑定按鈕
    document.getElementById('grade-btn').addEventListener('click', () => {
      // 簡單模擬: 有檔就顯示隨機結果
      const file = document.getElementById('photo-upload').files[0];
      const result = document.getElementById('result');
      if (!file) {
        result.classList.add('hidden');
        alert(lang === 'pl' ? 'Proszę załadować zdjęcie.' : 'Please upload a photo first.');
        return;
      }
      // 隨機選一種結果
      const idx = Math.floor(Math.random() * i18n[lang].results.length);
      const grade = i18n[lang].results[idx];
      document.getElementById('colorScore').textContent = grade.colorScore;
      document.getElementById('foam').textContent = grade.foam;
      document.getElementById('usage').textContent = grade.usage;
      result.classList.remove('hidden');
    });

    // 預設語言
    setLang('en');
  </script>
</body>
</html>
<script>
  // === Gemini 1.5 Flash API 設定 ===
  const GEMINI_API_URL = "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash-latest:generateContent";
  const GEMINI_API_KEY = "AIzaSyAKAzRi3zLRsSnwR65CqMR5L1cuw4BOFTU"; // <--- 請在這裡貼上你的 API Key

  // 將 File 物件轉成 base64
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = error => reject(error);
      reader.readAsDataURL(file);
    });
  }

  // 波蘭文 prompt 樣板
  function buildPrompt() {
    return `
Przeanalizuj przesłane zdjęcie matchy na podstawie następujących kryteriów:

1. Kolor (w skali 1-10, im bardziej zielony, tym wyższa ocena).
2. Tekstura piany (wpisz: "Drobna" lub "Gruba").
3. Zalecane zastosowanie (wybierz: "Ceremonia herbaciana", "Matcha Latte" lub "Do wypieków").

Odpowiedz wyłącznie po polsku i podaj wyniki wg poniższego szablonu:

Wynik oceny:
- Wynik koloru: [tutaj wpisz liczbę (1-10)]
- Piana: [Drobna/Gruba]
- Zalecane zastosowanie: [Ceremonia herbaciana/Matcha Latte/Do wypieków]
`;
  }

  // 用 Gemini API 做照片鑑定
  async function analyzePhotoWithGemini(file) {
    const base64Img = await fileToBase64(file);

    const requestBody = {
      contents: [
        {
          parts: [
            {
              text: buildPrompt()
            },
            {
              inlineData: {
                mimeType: file.type,
                data: base64Img
              }
            }
          ]
        }
      ]
    };

    const resp = await fetch(`${GEMINI_API_URL}?key=${GEMINI_API_KEY}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(requestBody)
    });

    if (!resp.ok) throw new Error("Błąd podczas analizy zdjęcia");

    const data = await resp.json();
    // content.parts[0].text
    if (
      data &&
      data.candidates &&
      data.candidates[0] &&
      data.candidates[0].content &&
      data.candidates[0].content.parts &&
      data.candidates[0].content.parts[0].text
    ) {
      return data.candidates[0].content.parts[0].text;
    } else {
      throw new Error("Brak odpowiedzi z Gemini API.");
    }
  }

  // 改寫鑑定按鈕事件
  document.getElementById('grade-btn').addEventListener('click', async () => {
    const file = document.getElementById('photo-upload').files[0];
    const resultEl = document.getElementById('result');
    if (!file) {
      resultEl.classList.add('hidden');
      alert('Proszę załadować zdjęcie.');
      return;
    }

    // 清空舊的結果&顯示載入中訊息
    resultEl.classList.remove('hidden');
    resultEl.innerHTML = "<div class='text-center text-gray-700'>Analizuję... Proszę czekać.</div>";

    try {
      const plResult = await analyzePhotoWithGemini(file);
      resultEl.innerHTML = `<pre class="whitespace-pre-wrap text-left">${plResult}</pre>`;
    } catch (e) {
      resultEl.innerHTML = "<span class='text-red-500'>Nie udało się przeanalizować zdjęcia. Spróbuj ponownie później.</span>";
    }
  }, { once: true }); // 替換原來的事件處理器，只掛載一次

  // 若原本自動掛載了 setLang，改為手動設置
  setLang('pl');
</script>
