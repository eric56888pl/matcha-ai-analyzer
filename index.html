<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Zen Photo Grader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #eae7de; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start pt-12 bg-[#eae7de] text-[#133529]">
  <div class="w-full max-w-md mx-auto p-8 rounded-2xl shadow-lg bg-white/90" style="background-color: #eae7de;">
    
    <div class="flex justify-end mb-8">
      <button id="lang-en" class="text-[#133529] border-2 border-[#133529] rounded-full px-4 py-1 mr-2 font-semibold hover:bg-[#133529] hover:text-[#eae7de] transition">EN</button>
      <button id="lang-pl" class="text-[#133529] border-2 border-[#133529] rounded-full px-4 py-1 font-semibold hover:bg-[#133529] hover:text-[#eae7de] transition">PL</button>
    </div>
    
    <div class="mb-6">
      <label id="upload-label" for="photo-upload" class="block mb-2 text-lg font-medium text-[#133529]">Upload Photo</label>
      <div class="w-full flex items-center justify-center bg-[#eae7de] border-2 border-dashed border-[#133529] rounded-lg py-8 cursor-pointer hover:bg-[#dcd8cc] transition" id="drop-zone">
        <div>
          <input id="photo-upload" type="file" accept="image/*" class="hidden" />
          <button id="select-photo" class="bg-[#133529] text-[#eae7de] px-4 py-2 rounded-lg shadow hover:bg-[#254e35] transition font-semibold pointer-events-none">
            Select Image
          </button>
        </div>
      </div>
      <div id="preview-container" class="mt-4 flex justify-center hidden">
        <img id="preview-img" class="max-h-48 rounded-xl object-cover shadow border-2 border-[#133529]" src="" alt="Preview">
      </div>
    </div>
    
    <div class="flex justify-center mb-8">
      <button id="grade-btn" class="bg-[#133529] text-[#eae7de] text-lg px-8 py-3 rounded-full hover:bg-[#254e35] transition font-bold shadow disabled:opacity-50">
        Grade
      </button>
    </div>
    
    <div id="result" class="bg-white/80 p-6 rounded-xl shadow-inner text-[#133529] hidden text-left leading-relaxed">
      </div>
  </div>
  
  <script>
    // 前端不保存 API Key，改呼叫後端端點
    const ANALYZE_API_URL = "/api/analyze";

    let currentLang = 'pl'; // 預設波蘭文

    // 介面文字切換
    const uiText = {
      en: { upload: 'Upload Photo', select: 'Select Image', grade: 'Analyze Matcha', loading: 'AI is analyzing...', error: 'Analysis failed. Check console for details.', noFile: 'Please upload an image first.' },
      pl: { upload: 'Załaduj zdjęcie', select: 'Wybierz zdjęcie', grade: 'Oceń Matchę', loading: 'AI analizuje...', error: 'Nie udało się przeanalizować. Sprawdź konsolę.', noFile: 'Proszę najpierw załadować zdjęcie.' }
    };

    function updateUI() {
      document.getElementById('upload-label').textContent = uiText[currentLang].upload;
      document.getElementById('select-photo').textContent = uiText[currentLang].select;
      document.getElementById('grade-btn').textContent = uiText[currentLang].grade;
      
      document.getElementById('lang-en').classList.toggle('bg-[#133529]', currentLang === 'en');
      document.getElementById('lang-en').classList.toggle('text-[#eae7de]', currentLang === 'en');
      document.getElementById('lang-pl').classList.toggle('bg-[#133529]', currentLang === 'pl');
      document.getElementById('lang-pl').classList.toggle('text-[#eae7de]', currentLang === 'pl');
    }

    document.getElementById('lang-en').addEventListener('click', () => { currentLang = 'en'; updateUI(); });
    document.getElementById('lang-pl').addEventListener('click', () => { currentLang = 'pl'; updateUI(); });
    updateUI();

    // 圖片上傳與預覽
    const fileInput = document.getElementById('photo-upload');
    const dropZone = document.getElementById('drop-zone');
    const previewContainer = document.getElementById('preview-container');
    const previewImg = document.getElementById('preview-img');

    dropZone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file && file.type.startsWith('image/')) {
        previewImg.src = URL.createObjectURL(file);
        previewContainer.classList.remove('hidden');
        document.getElementById('result').classList.add('hidden'); // 換照片時隱藏舊結果
      }
    });

    // 將圖片轉為 Base64 (AI 需要的格式)
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = error => reject(error);
        reader.readAsDataURL(file);
      });
    }

    // AI 鑑定按鈕邏輯 (只有這一個 Event Listener！)
    document.getElementById('grade-btn').addEventListener('click', async () => {
      const file = fileInput.files[0];
      const resultEl = document.getElementById('result');
      const gradeBtn = document.getElementById('grade-btn');

      if (!file) {
        alert(uiText[currentLang].noFile);
        return;
      }

      // UI 進入載入狀態
      resultEl.classList.remove('hidden');
      resultEl.innerHTML = `<div class='text-center animate-pulse font-bold'>🍵 ${uiText[currentLang].loading}</div>`;
      gradeBtn.disabled = true;

      try {
        const base64Img = await fileToBase64(file);
        
        // 根據選擇的語言發送不同的 Prompt
        const promptText = currentLang === 'pl' 
          ? `Jesteś ekspertem od japońskiej herbaty matcha. Przeanalizuj to zdjęcie:
             1. Oceń kolor (1-10, im żywszy zielony, tym wyżej).
             2. Oceń piankę (jeśli widoczna).
             3. Podaj werdykt: czy to jakość ceremonialna (do picia), czy kulinarna (do wypieków).
             Odpowiedz krótko, używając wypunktowań, w języku polskim.`
          : `You are a Japanese matcha expert. Analyze this photo:
             1. Score the color (1-10, brighter green is higher).
             2. Assess the foam (if visible).
             3. Verdict: Is this Ceremonial grade or Culinary grade?
             Keep it short, use bullet points, in English.`;

        const response = await fetch(ANALYZE_API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            promptText,
            mimeType: file.type,
            imageBase64: base64Img
          })
        });

        const data = await response.json();

        // 檢查 API 是否回傳錯誤
        if (!response.ok) {
          console.error("API Error Details:", data);
          throw new Error(data.error?.message || "API request failed");
        }

        // 成功取得 AI 回覆
        const aiReply = data.candidates[0].content.parts[0].text;
        
        // 將 AI 回覆格式化並顯示在畫面上
        resultEl.innerHTML = `<div class="whitespace-pre-wrap font-medium">${aiReply}</div>`;

      } catch (error) {
        console.error("Catch Error:", error);
        // 如果報錯，把錯誤訊息印在畫面上，方便我們除錯！
        resultEl.innerHTML = `<div class='text-red-600 font-bold'>${uiText[currentLang].error}</div><div class='text-sm text-red-400 mt-2 text-xs overflow-auto'>${error.message}</div>`;
      } finally {
        gradeBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
