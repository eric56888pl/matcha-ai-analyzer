<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Zen Matcha Analyzer Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;900&display=swap" rel="stylesheet">
  <style>
    body { background-color: #f8f5f0; font-family: 'Noto Sans JP', sans-serif; color: #2d463e; overflow-x: hidden; position: relative; }
    .fade-in { animation: fadeIn 1.5s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* 🌸 櫻花粉色雨 🌸 */
    .sakura { position: fixed; top: -10%; background: #ffb7c5; border-radius: 100% 0 100% 100%; opacity: 0.6; pointer-events: none; z-index: 0; animation: fall linear infinite; box-shadow: 0 0 5px rgba(255, 183, 197, 0.3); }
    @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }
    
    .loader { border: 2px solid #e5e7eb; border-top: 2px solid #2d463e; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* ✨ 分數顏色標籤 ✨ */
    .score-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-weight: bold; color: white; margin-left: 5px; font-size: 0.85em; vertical-align: middle; }
    .score-high { background-color: #A8C66C; box-shadow: 0 0 8px rgba(168, 198, 108, 0.6); } /* 金綠色 */
    .score-low { background-color: #8B7355; } /* 枯木褐色 */
    .score-mid { background-color: #2d463e; }
    
    #ui-loading-quote { opacity: 0.7; font-size: 0.9em; font-style: italic; margin-top: 10px; display: block; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center">

  <div class="sakura" style="width:10px;height:14px;left:5%;animation-duration:8s;"></div>
  <div class="sakura" style="width:12px;height:16px;left:25%;animation-duration:12s;animation-delay:1s;"></div>
  <div class="sakura" style="width:8px;height:12px;left:45%;animation-duration:10s;animation-delay:3s;"></div>
  <div class="sakura" style="width:14px;height:18px;left:65%;animation-duration:15s;animation-delay:2s;"></div>
  <div class="sakura" style="width:10px;height:14px;left:85%;animation-duration:9s;animation-delay:4s;"></div>

  <div class="fixed top-6 right-6 z-50 flex gap-2 text-[10px] font-bold">
    <button id="btn-en" onclick="setLanguage('en')" class="px-3 py-1 border border-[#2d463e] rounded hover:bg-[#2d463e] hover:text-white transition-all">EN</button>
    <button id="btn-pl" onclick="setLanguage('pl')" class="px-3 py-1 border border-[#2d463e] rounded hover:bg-[#2d463e] hover:text-white transition-all">PL</button>
  </div>

  <header class="w-full max-w-4xl pt-20 pb-12 px-6 text-center fade-in">
    <h1 id="ui-title" class="text-4xl md:text-5xl font-black tracking-tighter mb-4 text-[#2d463e]">Zen Matcha Analyzer</h1>
    <p id="ui-subtitle" class="text-sm uppercase tracking-[0.3em] opacity-60">Purity • Truth • Strictness</p>
  </header>

  <main class="w-full max-w-md px-6 pb-20 fade-in" style="animation-delay: 0.3s;">
    <div class="bg-white p-8 rounded-sm shadow-sm border border-[#e5e1d8] relative overflow-hidden z-10">
      
      <div id="drop-zone" class="border border-dashed border-[#2d463e]/20 py-12 text-center hover:bg-[#fcfbf9] transition-colors cursor-pointer group">
        <input type="file" id="photo-upload" class="hidden" accept="image/*">
        <p id="ui-upload-text" class="text-xs tracking-widest uppercase font-medium">Select Matcha Photo</p>
      </div>

      <div id="preview-container" class="mt-8 hidden w-full flex justify-center bg-[#f8f5f0] p-2 rounded-sm border border-[#e5e1d8]">
        <img id="preview-img" class="w-full max-h-[45vh] object-contain rounded-sm shadow-inner transition-all">
      </div>

      <button id="grade-btn" class="w-full mt-8 bg-[#2d463e] text-[#f8f5f0] py-4 text-sm tracking-[0.2em] font-bold hover:bg-[#1d2f29] transition-all disabled:opacity-50 z-20 relative">
        <span id="ui-btn-text">ANALYZE QUALITY</span>
      </button>

      <div id="loading-area" class="mt-4 text-center hidden">
        <span class="loader"></span>
        <span id="ui-loading-quote">Consulting the Master...</span>
      </div>

      <div id="result" class="mt-8 pt-8 border-t border-[#f0eee9] hidden">
        <div id="ai-content" class="text-sm leading-relaxed text-[#4a5551]"></div>
      </div>
    </div>
  </main>

  <script>
    const translations = {
      en: {
        title: "Zen Matcha Analyzer", subtitle: "Purity • Truth • Strictness", upload: "Select Photo", btn: "ANALYZE QUALITY", error: "Connection Error", noFile: "Select a photo.",
        loadingQuotes: ["Ichi-go Ichi-e. One moment, one encounter.", "Scanning for vibrant jade powder...", "Checking opacity and suspension...", "Verifying if this is true Matcha...", "Analyzing froth density..."],
        prompt: `You are an extremely strict Japanese Matcha Sommelier. 
                 STEP 1: IDENTITY CHECK. (Matcha powder or opaque suspension?)
                 STEP 2: ANALYSIS.
                 - COLOR Score: X/10 (10=Electric Jade, 1=Dull Yellow).
                 - QUALITY Score: X/10 (10=Fine powder/Micro-bubbles, 1=Grainy/Soapy).
                 STEP 3: VERDICT CATEGORY:
                 - 9-10: [TOP CEREMONIAL] Rare masterpiece quality.
                 - 7-8: [PREMIUM DAILY] High-quality tea, fit for casual ceremony.
                 - 5-6: [STANDARD] Good for lattes or daily drinking.
                 - BELOW 5: [CULINARY] Strictly for baking only. 
                 Be honest but distinguish clearly between 'High Quality Daily' and 'Culinary'.`
      },
      pl: {
        title: "Zen Matcha Analyzer", subtitle: "Czystość • Prawda • Surowość", upload: "Wybierz zdjęcie", btn: "OCEŃ JAKOŚĆ", error: "Błąd połączenia", noFile: "Wybierz zdjęcie.",
        loadingQuotes: ["Ichi-go Ichi-e. Jedna chwila, jedno spotkanie.", "Szukanie żywego, nefrytowego proszku...", "Sprawdzanie mętności i zawiesiny...", "Weryfikacja autentyczności Matchy...", "Analizowanie gęstości pianki..."],
        prompt: `Jesteś niezwykle surowym japońskim sommelierem Matchy.
                 KROK 1: IDENTYFIKACJA SUBSTANCJI.
                 - Czy to zielona, NIEPRZEZROCZYSTA (mętna) zawiesina? (Matcha płynna)
                 - Czy to żywo zielony, DROBNY proszek? (Matcha w proszku)
                 - Jeśli płyn jest KLAROWNY/PRZEZROCZYSTY (jak Sencha/herbata z torebki) lub CZERWONY/BRĄZOWY (Czarna herbata/Kawa), ZATRZYMAJ SIĘ i powiedz: "To nie jest Matcha. Mistrz ocenia tylko prawdziwą sproszkowaną Matchę."
                 KROK 2: JEŚLI ZWERYFIKOWANO, oceń:
                 - KOLOR (1-10): "Wynik KOLORU: X/10". Bądź brutalny. 10 = Żywa zieleń, 1 = Żółtawy/Przezroczysty.
                 - PIANKA/TEKSTURA (1-10): "Wynik JAKOŚCI: X/10". Mikropęcherzyki lub drobny proszek = 10.
                 KROK 3: WERDYKT. Bądź szczery. Jeśli to jakość kulinarna, wyjaśnij dlaczego nie nadaje się do ceremonii.`
      }
    };

    let currentLang = 'en';
    function setLanguage(lang) {
      currentLang = lang;
      document.getElementById('ui-title').textContent = translations[lang].title;
      document.getElementById('ui-subtitle').textContent = translations[lang].subtitle;
      document.getElementById('ui-upload-text').textContent = translations[lang].upload;
      document.getElementById('ui-btn-text').textContent = translations[lang].btn;
    }
    setLanguage('en');

    // 🟢 分數解析邏輯：將 X/10 轉換為彩色標籤 🟢
    function processAiResponse(text) {
      const regex = /(\d+)\/10/g;
      const processed = text.replace(regex, (match, score) => {
        const s = parseInt(score);
        let cls = 'score-mid';
        if (s >= 9) cls = 'score-high'; // 金綠
        else if (s < 5) cls = 'score-low'; // 枯褐
        return `<span class="score-tag ${cls}">${match}</span>`;
      });
      return `<div class="fade-in font-medium">${processed.replace(/\n/g, '<br>')}</div>`;
    }

    const fileInput = document.getElementById('photo-upload');
    document.getElementById('drop-zone').onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        document.getElementById('preview-img').src = URL.createObjectURL(file);
        document.getElementById('preview-container').classList.remove('hidden');
        document.getElementById('result').classList.add('hidden');
      }
    };

    document.getElementById('grade-btn').onclick = async () => {
      const file = fileInput.files[0];
      if (!file) return alert(translations[currentLang].noFile);

      const btn = document.getElementById('grade-btn');
      const btnText = document.getElementById('ui-btn-text');
      const resultDiv = document.getElementById('result');
      const aiContent = document.getElementById('ai-content');
      const loadingArea = document.getElementById('loading-area');

      // UI 載入狀態
      btn.disabled = true;
      btnText.classList.add('hidden');
      loadingArea.classList.remove('hidden');
      resultDiv.classList.add('hidden');
      
      // 隨機載用語錄
      const quotes = translations[currentLang].loadingQuotes;
      document.getElementById('ui-loading-quote').textContent = quotes[Math.floor(Math.random() * quotes.length)];

      try {
        const reader = new FileReader();
        const base64Img = await new Promise(r => { reader.onload = () => r(reader.result.split(',')[1]); reader.readAsDataURL(file); });
        
        const res = await fetch("/api/analyze", { 
          method: "POST", 
          headers: { "Content-Type": "application/json" }, 
          body: JSON.stringify({ promptText: translations[currentLang].prompt, mimeType: file.type, imageBase64: base64Img }) 
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        aiContent.innerHTML = processAiResponse(data.candidates[0].content.parts[0].text);
        resultDiv.classList.remove('hidden');
      } catch (err) {
        aiContent.innerHTML = `<span class="text-red-700 font-bold">❌ ${translations[currentLang].error}</span><br><small class="opacity-60">${err.message}</small>`;
        resultDiv.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btnText.classList.remove('hidden');
        loadingArea.classList.add('hidden');
      }
    };
  </script>
</body>
</html>
